services:
  couchdb:
    build: .
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    ports:
      - "5984"
    healthcheck:
      test:
        - CMD
        - bash
        - '-c'
        - 'curl -sf -u $${COUCHDB_USER}:$${COUCHDB_PASSWORD} http://localhost:5984/'
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 30s
    volumes:
      - couchdb-data:/opt/couchdb/data
    restart: unless-stopped

volumes:
  couchdb-data: